name: Desktop Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphchan-macos
          path: |
            target/release/graphchan_desktop
            target/release/bundle/macos/Graphchan.app

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxdo-dev \
            libxext-dev \
            libxrandr-dev \
            nasm \
            patchelf \
            pkg-config \
            wget \
            yasm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build:frontend

      - name: Build Linux executable
        run: cargo build --release -p graphchan_desktop

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphchan-linux
          path: target/release/graphchan_desktop
